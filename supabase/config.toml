[edge_runtime]
enabled = true
# Configure one of the supported pooler modes: `transaction`, `session`.
inspector_port = 8083
# Configure one of the supported pooler modes: `transaction`, `session`.
# The TLS settings for the database connection.
# [edge_runtime.tls]
# tls_certificate_path = "file/path/to/certificate.crt"
# tls_key_path = "file/path/to/private.key"
# tls_key_path_password = "optional_password"

[analytics]
enabled = true
port = 54327
# Configure one of the supported backends: `postgres`, `bigquery`.
backend = "postgres"

# Experimental features may cause breaking changes or be removed at any time.
[experimental]
# Configures Postgres storage engine to use OrioleDB (S3) or S3 (Parquet) instead of the default heap storage.
# https://supabase.github.io/supabase-content-server/docs/guides/database/orioledb
orioledb_version = ""
# Configures S3 bucket URL, eg: <bucket_name>.s3-<region>.amazonaws.com
s3_host = ""
# Configures S3 bucket region, eg: us-east-1
s3_region = ""
# Configures S3 bucket access key
s3_access_key = ""
# Configures S3 bucket secret key
s3_secret_key = ""
